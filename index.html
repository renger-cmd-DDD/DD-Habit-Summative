    <script>
        // --- Sound Manager (Procedural Audio) ---
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.enabled = true;
                this.musicInterval = null;
                this.isPlayingMusic = false;
                this.ambientInterval = null;
                this.isAmbientPlaying = false;
            }

            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }

            startAmbientMusic() {
                if (!this.enabled) return;
                this.init();
                if (this.isAmbientPlaying || this.isPlayingMusic) return;
                this.isAmbientPlaying = true;

                // Lively Medieval RPG Melody (C Major Pentatonic-ish)
                const melody = [
                    261.63, 392.00, 329.63, 261.63, // C4, G4, E4, C4
                    293.66, 440.00, 349.23, 293.66, // D4, A4, F4, D4
                    329.63, 493.88, 392.00, 329.63, // E4, B4, G4, E4
                    349.23, 523.25, 440.00, 349.23  // F4, C5, A4, F4
                ];
                let step = 0;

                this.ambientInterval = setInterval(() => {
                    if (this.isPlayingMusic) return;
                    if (this.ctx.state === 'suspended') this.ctx.resume();
                    
                    const now = this.ctx.currentTime;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    // Triangle wave for a softer, woodwind-like or retro RPG feel
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(melody[step % melody.length], now);
                    
                    // Upbeat envelope
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.exponentialRampToValueAtTime(0.04, now + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.5);
                    
                    step++;
                }, 400); // 150 BPM approx (if 4 beats per note set at 400ms)
            }

            stopAmbientMusic() {
                if (this.ambientInterval) {
                    clearInterval(this.ambientInterval);
                    this.ambientInterval = null;
                }
                this.isAmbientPlaying = false;
            }

            startBattleMusic() {
                if (!this.enabled) return;
                this.init();
                this.stopAmbientMusic(); // Stop ambient when battle music starts
                if (this.isPlayingMusic) return;
                this.isPlayingMusic = true;

                const tempo = 120;
                const noteDuration = 60 / tempo / 2; // Eighth note
                // Simple chiptune bassline pattern
                const pattern = [110, 110, 164, 110, 146, 110, 164, 130];
                let step = 0;

                this.musicInterval = setInterval(() => {
                    if (this.ctx.state === 'suspended') this.ctx.resume();
                    const now = this.ctx.currentTime;
                    
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(pattern[step % pattern.length], now);
                    
                    gain.gain.setValueAtTime(0.04, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + noteDuration * 0.9);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.start(now);
                    osc.stop(now + noteDuration * 0.9);
                    
                    step++;
                }, noteDuration * 1000);
            }

            stopBattleMusic() {
                if (this.musicInterval) {
                    clearInterval(this.musicInterval);
                    this.musicInterval = null;
                }
                this.isPlayingMusic = false;
            }

            async playSound(type) {
                if (!this.enabled) return;
                this.init();
                if (this.ctx.state === 'suspended') await this.ctx.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                switch(type) {
                    case 'click':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.1);
                        osc.start(now);
                        osc.stop(now + 0.1);
                        break;
                    case 'complete': // Habit Completion
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(440, now);
                        osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                        osc.frequency.exponentialRampToValueAtTime(1320, now + 0.2);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.3);
                        osc.start(now);
                        osc.stop(now + 0.3);
                        break;
                    case 'buy': // Buy item
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                        osc.frequency.exponentialRampToValueAtTime(400, now + 0.2);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.4);
                        osc.start(now);
                        osc.stop(now + 0.4);
                        break;
                    case 'victory': // Fanfare
                        osc.type = 'square';
                        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                            const subOsc = this.ctx.createOscillator();
                            const subGain = this.ctx.createGain();
                            subOsc.type = 'square';
                            subOsc.frequency.setValueAtTime(freq, now + i * 0.1);
                            subGain.connect(this.ctx.destination);
                            subOsc.connect(subGain);
                            subGain.gain.setValueAtTime(0.15, now + i * 0.1);
                            subGain.gain.linearRampToValueAtTime(0, now + i * 0.1 + 0.5);
                            subOsc.start(now + i * 0.1);
                            subOsc.stop(now + i * 0.1 + 0.5);
                        });
                        break;
                    case 'hit': // Sword Clash
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(10, now + 0.1);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.1);

                        const noise = this.ctx.createOscillator();
                        const noiseGain = this.ctx.createGain();
                        noise.type = 'square';
                        noise.frequency.setValueAtTime(1000, now);
                        noise.frequency.linearRampToValueAtTime(200, now + 0.05);
                        noiseGain.gain.setValueAtTime(0.1, now);
                        noiseGain.gain.linearRampToValueAtTime(0, now + 0.05);
                        noise.connect(noiseGain);
                        noiseGain.connect(this.ctx.destination);
                        noise.start(now);
                        noise.stop(now + 0.05);

                        osc.start(now);
                        osc.stop(now + 0.1);
                        break;
                }
            }
        }

        const sound = new SoundManager();

        // --- Visual Effects Helpers ---
        function triggerConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FFD700', '#B5451B', '#E2C4A0', '#d8973c']
            });
        }

        function triggerCoinRain() {
            const container = document.querySelector('.relative.w-full.max-w-\\[380px\\]');
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const coin = document.createElement('div');
                    coin.className = 'coin-particle pixel-text';
                    coin.innerHTML = '💎';
                    coin.style.left = Math.random() * 90 + 5 + '%';
                    coin.style.fontSize = Math.random() * 10 + 10 + 'px';
                    container.appendChild(coin);
                    setTimeout(() => coin.remove(), 1500);
                }, i * 50);
            }
        }

        let activeStream = null;

        async function startCamera() {
            const video = document.getElementById('camera-preview');
            const errorFallback = document.getElementById('camera-error');
            const snapBtn = document.getElementById('snap-btn');
            
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                if (video) {
                    video.srcObject = activeStream;
                    video.onloadedmetadata = () => video.play();
                    video.classList.remove('hidden');
                }
                if (errorFallback) errorFallback.classList.add('hidden');
                if (snapBtn) snapBtn.classList.remove('hidden');
            } catch (err) {

        function stopCamera() {
            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
                activeStream = null;
            }
        }

        function capturePhoto() {
            const video = document.getElementById('camera-preview');
            const selector = document.getElementById('vessel-selector');
            const vesselType = selector ? selector.value : "0";

            if (video && video.srcObject) {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                // Immediately terminate all active camera hardware tracks
                stopCamera();
                
                processUnifiedAnalysis(canvas, vesselType);
            }
        }

        function handleFileUpload(input) {
            const selector = document.getElementById('vessel-selector');
            const vesselType = selector ? selector.value : "0";

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        
                        processUnifiedAnalysis(canvas, vesselType);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

            const width = canvas.width;

            // Check Layer A (Declaration Enforcement)

            // Mathematical constraint that forces general images to fail the grid check
            const structuralSignature = (width * height) % 7;
            const passesStructuralChallenge = structuralSignature !== 0 && (structuralSignature % 2 !== 0);
            
            if (hasDeclaration && passesStructuralChallenge) {
                simulateVerification('water');
            } else {

            }
        }

                'photosynthesis': ['light', 'plant', 'sun', 'food', 'green', 'leaf', 'energy'],
                'gravity': ['pull', 'earth', 'fall', 'mass', 'weight', 'down', 'star'],
                'blockchain': ['block', 'chain', 'money', 'digital', 'ledger', 'safety', 'internet'],
                'coding': ['computer', 'write', 'instruction', 'language', 'logic', 'app'],
                'gym': ['muscle', 'lift', 'exercise', 'health', 'strong', 'run'],
                'habit': ['repeat', 'routine', 'every day', 'small', 'goal']
            };

            let relevant = true;
            if (dictionary[topic]) {
                relevant = dictionary[topic].some(keyword => text.toLowerCase().includes(keyword));
            }

            if (sentences.length === 0 || !relevant) {
                targetArea.style.borderColor = "#ff0000";
                targetArea.classList.add('animate-shake');
                showToast("Explanation failed synthesis check. Be more specific!");
                setTimeout(() => {
                    targetArea.style.borderColor = "#5c3d2e";
                    targetArea.classList.remove('animate-shake');
                }, 1000);
                return;
            }

            simulateVerification('recall', topic);
        }

        function activateCheat() {
            const val = document.getElementById('cheat-input').value.toUpperCase();
            if (val === 'MRMARK') {
                state.user.cr = 9999;
                
                // Automatically tick all 3 habits
                Object.keys(state.habits).forEach(key => {
                    const habit = state.habits[key];
                    if (!habit.completed) {
                        habit.completed = true;
                        habit.streak += 1;
                        state.user.xp += habit.xp;
                        state.user.cr += habit.cr;
                        state.user.completed += 1;
                    }
                });

                // Trigger perfect day bonus if all ticked
                if (state.user.completed === 3) {
                    state.user.cr += 20;
                    state.user.streak += 1;

        function checkLevelUp() {
            let oldLv = state.user.lv;
            
            if (state.user.xp >= 250) {
                state.user.lv = 3;
            } else if (state.user.xp >= 100) {
                state.user.lv = 2;
            } else {
                state.user.lv = 1;
            }

            if (state.user.lv > oldLv) {
                showToast(`LEVEL UP! REACHED LV. ${state.user.lv}`);
                sound.playSound('complete');
                
                // Maximum health scale adjustments immediately following reward
                if (state.user.lv === 1) state.user.maxHp = 100;
                else if (state.user.lv === 2) state.user.maxHp = 150;
                else if (state.user.lv === 3) state.user.maxHp = 200;

                if (state.inventory.includes("THE KNIGHT")) {
                    state.user.maxHp += 50;
                }
                if (state.user.upgrades && state.user.upgrades.runicShield) {
                    state.user.maxHp += 50;
                }
            }
        }

        // --- Shop Logic ---
        function buyItem(name, price) {
            if (state.user.cr < price) {
                showToast("INSUFFICIENT CRYSTALS!");
                return;
            }
            if (state.inventory.includes(name)) {
                showToast("ALREADY OWNED!");
                return;
            }
            state.user.cr -= price;
            state.inventory.push(name);
            
            // Class & Upgrades Logic
            if (name === "THE KNIGHT") {
                state.user.characterClass = "KNIGHT";
                state.user.maxHp = 150;
            } else if (name === "THE MAGE") {
                state.user.characterClass = "MAGE";

                state.user.upgrades.whiteNail = true;
            } else if (name === "PET BEETLE") {

            } else if (name === "RUNIC SHIELD") {
                state.user.upgrades.runicShield = true;
                state.user.maxHp += 50;
                state.battle.playerHp += 50;
            }

            triggerCoinRain();
            sound.playSound('buy');

        function battleAction(action) {
            if (state.battle.isFrozen) return;

            if (action === 'retreat') {
                sound.playSound('click');
                state.user.counters.retreatClicked = true;
                if (state.user.cr < 10) {
                    showToast("CANNOT RETREAT! (10 CR REQ)");
                    return;
                }
                state.user.cr -= 10;
                sound.stopBattleMusic();
                sound.startAmbientMusic();
                clearBattleIntervals();
                const screen = document.getElementById('battle-screen');
                if (screen) screen.remove();
                showToast("RETREATED! -10 CR");
                updateHeader();
                return;
            }

            if (action === 'fight') {
                sound.playSound('click');
                
                const buttons = document.getElementById('action-buttons');
                if (buttons) buttons.classList.add('hidden');
                
                state.battle.attacksRemaining = state.battle.attacksPerTurn;
                nextAttack();
            }
        }

        function nextAttack() {
            if (state.battle.attacksRemaining <= 0) {
                const miniGroup = document.getElementById('minigame-container');
                if (miniGroup) miniGroup.classList.add('hidden');
                // Removed button show here, moved to after boss attack in bossAttack()
                
                if (state.battle.bossHp <= 0) {
                    victory();
                } else {
                    bossAttack();
                }
                return;
            }

            const miniGroup = document.getElementById('minigame-container');
            if (miniGroup) miniGroup.classList.remove('hidden');

            const notifyEl = document.getElementById('dmg-notification');
            if (notifyEl) notifyEl.textContent = `ATTACK ${state.battle.attacksPerTurn - state.battle.attacksRemaining + 1} OF ${state.battle.attacksPerTurn}`;

            state.battle.sliderPos = 0;
            state.battle.sliderDir = 1;
            state.battle.isRolling = true;
            state.battle.isFrozen = false;
            
            // Randomized speed range from slow to slightly fast (2% to 6% per tick)
            let speed = Math.random() * 4 + 2;
            if (state.user.upgrades && state.user.upgrades.purpleFlame) {
                speed *= 0.9;
            }

            state.battle.sliderInterval = setInterval(() => {
                const caret = document.getElementById('slider-caret');
                if (!caret) return;
                state.battle.sliderPos += (speed * state.battle.sliderDir);
                if (state.battle.sliderPos >= 100) {
                    state.battle.sliderPos = 100;
                    state.battle.sliderDir = -1;
                } else if (state.battle.sliderPos <= 0) {
                    state.battle.sliderPos = 0;
                    state.battle.sliderDir = 1;
                }
                caret.style.left = state.battle.sliderPos + '%';
            }, 30);

            const screen = document.getElementById('battle-screen');
            const stopHandler = (e) => {
                if (state.battle.isRolling && !state.battle.isFrozen) {
                    e.stopPropagation();
                    stopSlider();
                    screen.removeEventListener('click', stopHandler);
                }
            };
            setTimeout(() => {
                if (screen) screen.addEventListener('click', stopHandler);
            }, 50);
        }

        function stopSlider() {
            state.battle.isRolling = false;
            state.battle.isFrozen = true;
            clearInterval(state.battle.sliderInterval);
            sound.playSound('hit');

            const pos = state.battle.sliderPos;
            // Equal zones (20% each): 0-20 (R), 20-40 (Y), 40-60 (G), 60-80 (Y), 80-100 (R)
            let dmgMult = 0;
            let msg = "MISS!";

            if (pos >= 40 && pos <= 60) {
                dmgMult = 1.0;
                msg = "PERFECT CRITICAL HIT!";
                triggerConfetti();
            } else if ((pos >= 20 && pos < 40) || (pos > 60 && pos <= 80)) {
                dmgMult = 0.5;
                msg = "SOLID HIT!";
            } else {
                msg = "MISS!";
            }

            const baseDmg = state.user.lv >= 3 ? 40 : (state.user.lv >= 2 ? 30 : 10);
            let finalBaseDmg = baseDmg;
            if (state.user.upgrades && state.user.upgrades.whiteNail) {
                finalBaseDmg += 10;
            }
            const totalDmg = Math.floor(finalBaseDmg * dmgMult);
            
            state.battle.bossHp -= totalDmg;
            if (state.battle.bossHp < 0) state.battle.bossHp = 0;

            const notifyEl = document.getElementById('dmg-notification');
            if (notifyEl) notifyEl.textContent = `${msg} DEALT ${totalDmg} DMG`;
            
            const bossHpFill = document.getElementById('boss-hp-fill');
            const maxBossHp = state.user.lv >= 3 ? 1000 : (state.user.lv >= 2 ? 300 : 120);
            if (bossHpFill) bossHpFill.style.width = (state.battle.bossHp / maxBossHp) * 100 + '%';
            
            const boss = document.getElementById('boss-sprite');
            if (boss) {
                boss.style.filter = 'brightness(2) contrast(2)';
                boss.classList.add('animate-ping');
                setTimeout(() => {
                    boss.style.filter = '';
                    boss.classList.remove('animate-ping');
                }, 200);
            }

            // Increment Turn every time the slider minigame is finished
            state.battle.attacksRemaining--;

            setTimeout(() => {
                state.battle.isFrozen = false;
                if (notifyEl) notifyEl.textContent = '';
                nextAttack();
            }, 1000);
        }

        function bossAttack() {
            const bossSprite = document.getElementById('boss-sprite');
            if (bossSprite) {
                bossSprite.classList.remove('floating');
                bossSprite.classList.add('animate-bounce');
                setTimeout(() => {
                    bossSprite.classList.remove('animate-bounce');
                    bossSprite.classList.add('floating');
                }, 800);
            }

            const hero = document.getElementById('hero-sprite');
            
            // Sync attack timing with bounce peak
            setTimeout(() => {
                sound.playSound('hit');
                if (hero) {
                    // Dramatic Hit Flash (Bright Red)
                    hero.style.filter = 'brightness(0) saturate(100%) invert(20%) sepia(90%) saturate(7000%) hue-rotate(0deg) contrast(150%)'; 
                    hero.classList.add('translate-x-2');
                    setTimeout(() => {
                        hero.style.filter = '';
                        hero.classList.remove('translate-x-2');
                    }, 200);
                }
                
                const bossDmg = state.user.lv >= 3 ? (Math.floor(Math.random() * 11) + 15) : (state.user.lv >= 2 ? (Math.floor(Math.random() * 11) + 5) : (Math.floor(Math.random() * 3) + 3)); 
                state.battle.playerHp -= bossDmg;
                if (state.battle.playerHp <= 0) {
                    state.battle.playerHp = 0;
                    const hpFill = document.getElementById('hero-hp-fill');
                    if (hpFill) hpFill.style.width = '0%';
                    setTimeout(gameOver, 500);
                } else {
                    const hpFill = document.getElementById('hero-hp-fill');
                    if (hpFill) hpFill.style.width = (state.battle.playerHp / state.user.maxHp) * 100 + '%';
                    
                    // After boss finishes and player is ready for next round
                    setTimeout(() => {
                        const buttons = document.getElementById('action-buttons');
                        if (buttons && state.battle.playerHp > 0) {
                            buttons.classList.remove('hidden');
                            state.battle.turn++;
                            const turnEl = document.getElementById('battle-turn-counter');
                            if (turnEl) turnEl.textContent = `TURN ${state.battle.turn}`;
                        }
                    }, 800);
                }
            }, 400);
        }

        function victory() {
            triggerConfetti();
            sound.playSound('victory');
            state.user.counters.willDefeats++;
            checkMastery();

            const streakBonus = 1 + (state.user.streak * 0.012);
            const reward = 50; 
            const xp = 50;     
            
            let totalReward = Math.floor(reward * streakBonus);
            let totalXp = Math.floor(xp * streakBonus);
            
            if (state.inventory.includes("XP FLASK")) {
                totalXp *= 2;
            }
            
            let rewardMsg = `+${totalReward} CRYSTALS`;
            if (state.user.upgrades && state.user.upgrades.petBeetle) {
                totalReward += 20;
                rewardMsg = `+${totalReward - 20} (+20 PET) CRYSTALS`;
            }
            
            state.user.cr += totalReward;
            state.user.xp += totalXp;
            
            checkLevelUp();

            const battleScreen = document.querySelector('.fixed.inset-0.z-\\[150\\]');
            battleScreen.innerHTML = `
                <div class="flex-grow flex flex-col items-center justify-center bg-black/90 text-center p-10 z-[300]">
                    <h1 class="text-yellow-500 text-3xl font-bold mb-6 pixel-text">VICTORY</h1>
                    <div class="w-32 h-32 bg-[#333] border-4 border-yellow-500 rounded-full flex items-center justify-center mb-6 overflow-hidden">
                        <i data-lucide="trophy" class="w-16 h-16 text-yellow-500"></i>
                    </div>
                    <div class="space-y-4 mb-8">
                        <p class="text-white pixel-text" style="font-size: 10px;">BOSS DEFEATED</p>
                        <p class="text-blue-400 pixel-text" style="font-size: 8px;">${rewardMsg}</p>
                        <p class="text-green-400 pixel-text" style="font-size: 8px;">+${totalXp} XP</p>
                    </div>
                    <button onclick="finishBattle()" class="btn-crimson w-full py-4 text-white pixel-text transform transition-all duration-100 active:scale-85 active:opacity-90">RETURN TO ARENA</button>
                </div>
            `;
            lucide.createIcons();
            updateHeader();
            updateFirebase();
        }

        function gameOver() {
            sound.stopBattleMusic();
            sound.startAmbientMusic();
            clearBattleIntervals();
            showModal(`
                <h2 class="pixel-text text-red-500 mb-4">DEFEAT</h2>
                <div class="p-6 brown-card mb-6">
                    <p class="text-white pixel-text" style="font-size: 8px;">THE SPIRE HAS RECLAIMED YOU.</p>
                </div>
                <button onclick="closeModal(); document.querySelector('.fixed.inset-0.z-\\[150\\]').remove();" class="btn-crimson w-full py-4 text-white pixel-text">RETURN TO CAMP</button>
            `);
        }

        function finishBattle() {
            sound.stopBattleMusic();
            sound.startAmbientMusic(); // Restart ambient after battle
            clearBattleIntervals();
            const screen = document.querySelector('.fixed.inset-0.z-\\[150\\]');
            if (screen) screen.remove();
            switchScreen('arena');
        }

        function clearBattleIntervals() {
            if (state.battle.sliderInterval) clearInterval(state.battle.sliderInterval);
            if (state.battle.animIntervals) {
                state.battle.animIntervals.forEach(id => clearInterval(id));
                state.battle.animIntervals = [];
            }
        }

        // --- Profile & Auth Helpers ---
        let appIntervals = [];
        let dailyResetInterval = null;
        let battleIdleInterval = null;
        let enemyFloatInterval = null;

        function trackInterval(fn, time, type) {
            const id = setInterval(fn, time);
            if (type === 'daily') dailyResetInterval = id;
            if (type === 'battleIdle') battleIdleInterval = id;
            if (type === 'enemyFloat') enemyFloatInterval = id;
            appIntervals.push(id);
            return id;
        }

        function clearAllIntervals() {
            appIntervals.forEach(id => clearInterval(id));
            appIntervals = [];
            if (dailyResetInterval) { clearInterval(dailyResetInterval); dailyResetInterval = null; }
            if (battleIdleInterval) { clearInterval(battleIdleInterval); battleIdleInterval = null; }
            if (enemyFloatInterval) { clearInterval(enemyFloatInterval); enemyFloatInterval = null; }
            clearBattleIntervals();
            if (sound) {
                if (sound.ambientInterval) clearInterval(sound.ambientInterval);
                if (sound.musicInterval) clearInterval(sound.musicInterval);
            }
        }

        function editProfileName() {
            const nameEl = document.getElementById('header-profile-name');
            const inputContainer = document.getElementById('header-name-input-container');
            const input = document.getElementById('header-name-input');
            
            input.value = state.user.profileName;
            nameEl.classList.add('invisible');
            inputContainer.classList.remove('hidden');
            input.focus();
            
            const save = () => {
                const newName = input.value.trim().toUpperCase() || "SPIRESTAG";
                state.user.profileName = newName;
                updateHeader();
                nameEl.classList.remove('invisible');
                inputContainer.classList.add('hidden');
                updateFirebase();
            };
            
            input.onblur = save;
            input.onkeydown = (e) => {
                if (e.key === 'Enter') save();
            };
        }

        function saveProfileNameFromSetup(value) {
            const newName = value.trim().toUpperCase() || "SPIRESTAG";
            state.user.profileName = newName;
            updateHeader();
            updateFirebase();
        }

        // Force these functions onto the absolute global window scope
        window.handleSpireSignOut = function() {
            console.log("Log Out triggered successfully.");
            try {
                if (typeof battleIdleInterval !== 'undefined') clearInterval(battleIdleInterval);
                clearAllIntervals();
                
                localStorage.removeItem('spire_guest_mode');
                localStorage.removeItem('spire_guest_state');
                
                const { auth, methods } = window.firebaseUtils;
                if (auth) {
                    methods.signOut(auth).then(() => {
                        window.location.reload();
                    }).catch(() => {
                        window.location.reload();
                    });
                } else {
                    window.location.reload();
                }
            } catch (err) {
                alert("Sign Out Error: " + err.message);
                window.location.reload();
            }
        };

        window.handleSpireAccountSwitch = function() {
            try {
                if (typeof battleIdleInterval !== 'undefined') clearInterval(battleIdleInterval);
                clearAllIntervals();
                
                localStorage.removeItem('spire_guest_mode');
                localStorage.removeItem('spire_guest_state');
                sessionStorage.setItem('spire_switch_account_mode', 'true');
                
                const { auth, methods } = window.firebaseUtils;
                if (auth) {
                    methods.signOut(auth).then(() => {
                        window.location.reload();
                    }).catch(() => {
                        window.location.reload();
                    });
                } else {
                    window.location.reload();
                }
            } catch (err) {
                alert("Switch Routing Error: " + err.message);
                window.location.reload();
            }
        };

        window.handleSpireSave = async function() {
            console.log("Manual save triggered.");
            try {
                sound.playSound('click');
                const btn = event?.currentTarget;
                if (btn) {
                    const originalContent = btn.innerHTML;
                    btn.innerHTML = '<i data-lucide="loader" class="w-6 h-6 text-yellow-400 animate-spin"></i><span class="pixel-text text-yellow-300" style="font-size: 6px;">SAVING...</span>';
                    lucide.createIcons();
                    
                    await updateFirebase();
                    
                    btn.innerHTML = '<i data-lucide="check" class="w-6 h-6 text-green-400"></i><span class="pixel-text text-green-300" style="font-size: 6px;">SUCCESS</span>';
                    lucide.createIcons();
                    
                    if (localStorage.getItem('spire_guest_mode') === 'true') {
                        showToast("PROGRESS SAVED LOCALLY");
                    } else {
                        showToast("PROGRESS SAVED TO CLOUD");
                    }
                    
                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                        lucide.createIcons();
                    }, 2000);
                } else {
                    await updateFirebase();
                    if (localStorage.getItem('spire_guest_mode') === 'true') {
                        showToast("PROGRESS SAVED LOCALLY");
                    } else {
                        showToast("PROGRESS SAVED TO CLOUD");
                    }
                }
            } catch (err) {
                console.error("Save failed:", err);
                showToast("SAVE FAILED. CHECK CONNECTION.");
            }
        };

        // --- Firebase Persistence / Offline Save ---
        async function updateFirebase() {
            if (localStorage.getItem('spire_guest_mode') === 'true') {
                localStorage.setItem('spire_guest_state', JSON.stringify(state));
                return;
            }
            if (window.firebaseUtils.db) {
                const { db, methods, auth } = window.firebaseUtils;
                if (auth.currentUser) {
                    try {
                        const userRef = methods.doc(db, "users", auth.currentUser.uid);
                        await methods.setDoc(userRef, { state }, { merge: true });
                    } catch (e) {
                        console.error("Firebase sync failed:", e);
                    }
                }
            }
        }

        // --- Init ---
        let isAppInitialized = false;
        function tryInitializeSpire() {
            if (isAppInitialized) return;
            
            // Wait for DOM to load
            if (document.readyState === 'loading') {
                return; 
            }
            
            // Check if Firebase scripts have completed compiling / run
            if (!window.firebaseLoaded) {
                return;
            }
            
            isAppInitialized = true;
            runSpireInitialization();
        }

        function runSpireInitialization() {
            applyLighting();

            // Start ambient music on first user interaction
            window.addEventListener('click', () => {
                sound.startAmbientMusic();
            }, { once: true });
            
            // Initial check for reset in case user is already logged in or session persists
            window.addEventListener('focus', () => {
                const { auth } = window.firebaseUtils;
                if (auth && auth.currentUser) {
                    checkDailyReset();
                }
            });

            // Guest Mode check
            if (localStorage.getItem('spire_guest_mode') === 'true') {
                const localSaved = localStorage.getItem('spire_guest_state');
                if (localSaved) {
                    try {
                        const guestData = JSON.parse(localSaved);
                        state = Object.assign(getInitialState(), guestData);
                    } catch (err) {
                        console.error("Error parsing guest state:", err);
                        state = getInitialState();
                    }
                } else {
                    state = getInitialState();
                    state.user.profileName = "GUEST";
                    state.lastResetDate = new Date().toISOString().split('T')[0];
                }
                
                checkDailyReset();
                trackInterval(checkDailyReset, 60000, 'daily');
                
                applyLighting();
                updateHeader();
                switchScreen('arena', true);
                return;
            }

            // Check auth state for persistence if configured
            if (window.firebaseUtils.auth) {
                window.firebaseUtils.methods.onAuthStateChanged(window.firebaseUtils.auth, async (user) => {
                    if (user) {
                        const { db, methods } = window.firebaseUtils;
                        const docRef = methods.doc(db, "users", user.uid);
                        try {
                            const docSnap = await methods.getDoc(docRef);
                            if (docSnap.exists()) {
                                const cloudData = docSnap.data().state;
                                state = Object.assign(getInitialState(), cloudData);
                            } else {
                                // New account initialization
                                state.lastResetDate = new Date().toISOString().split('T')[0];
                                // Default profile name to Google first name (Max 10 chars)
                                if (user.displayName) {
                                    state.user.profileName = user.displayName.split(' ')[0].toUpperCase().substring(0, 10);
                                }
                                await methods.setDoc(docRef, { state }, { merge: true });
                            }
                            
                            checkDailyReset();
                            // Start daily reset checker interval
                            trackInterval(checkDailyReset, 60000, 'daily'); 
                            
                            applyLighting();
                            updateHeader();
                            // Switch screen will handle hiding the login-gate
                            switchScreen('arena', true);
                        } catch (e) {
                            console.error("Critical Cloud Fetch Failure:", e);
                            showToast("CLOUD ERROR: USING LOCAL SESSION");
                            switchScreen('arena', true);
                        }
                    } else {
                        // Null Session State Block: Immediately freeze and show login gate
                        clearAllIntervals();
                        state = getInitialState();
                        updateHeader();
                        switchScreen('login', true);
                    }
                });
            } else {
                // If firebase is disconnected or failed, default to login view
                switchScreen('login', true);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            tryInitializeSpire();
            
            // Back up timeout: if Firebase doesn't load within 1.5s, run initialization anyway
            setTimeout(() => {
                if (!isAppInitialized) {
                    console.log("Firebase CDN load timeout, proceeding with offline/guest compatibility.");
                    window.firebaseLoaded = true; // force load
                    tryInitializeSpire();
                }
            }, 1500);
        });

        window.onFirebaseLoaded = function() {
            tryInitializeSpire();
        };

        let heroAnimFrame = 0;
        let bossAnimFrame = 0;
    </script>
</body>
</html>
